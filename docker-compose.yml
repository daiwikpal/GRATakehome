version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gra_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gra_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gra} -d ${POSTGRES_DB:-gra_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
